name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      frontend_url:
        description: 'Frontend URL (CloudFront)'
        required: false
        default: 'http://localhost:5173'
      chat_gateway_url:
        description: 'Chat Gateway URL'
        required: false
        default: 'http://localhost:3000'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '20'

jobs:
  e2e:
    name: Playwright E2E
    runs-on: blacksmith-4vcpu-ubuntu-2404 # 4vcpu: Playwright + Chromium needs RAM
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          CI: 'true'
          FRONTEND_URL: ${{ github.event.inputs.frontend_url }}
          CHAT_GATEWAY_URL: ${{ github.event.inputs.chat_gateway_url }}
          ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npx playwright test

      - name: Upload HTML report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
