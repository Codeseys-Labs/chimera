name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: '1.3.11'

jobs:
  ci:
    name: Test, Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_REGION: us-east-1
        run: |
          bun test \
            ./packages/shared/ \
            ./packages/core/ \
            ./packages/sse-bridge/ \
            ./packages/cli/ \
            ./infra/ \
            ./tests/unit/orchestration/ \
            ./tests/unit/core/ \
            ./tests/unit/skills/ \
            ./tests/unit/security/ \
            ./tests/unit/infra/ \
            ./tests/unit/swarm/

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck
