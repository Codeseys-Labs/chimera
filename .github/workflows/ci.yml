name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege GITHUB_TOKEN (Wave-16 H1). Default org-level grant is
# often write-all; explicit read-only for contents closes the supply-chain
# blast radius if a third-party action is compromised. Grant additional
# scopes per-job only where the job actually needs them.
permissions:
  contents: read

env:
  BUN_VERSION: '1.3.11'

jobs:
  test:
    name: Test, Lint & Typecheck
    runs-on: blacksmith-4vcpu-ubuntu-2404 # 4vcpu: parallel tests + tsc compilation
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun tests
        env:
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          AWS_REGION: us-east-1
        run: |
          # Excluding packages/cli (credential-dependent tests) and
          # packages/chat-gateway (Bun CJS/ESM compat with @aws-sdk/lib-dynamodb).
          # CLI tests run in isolation below; chat-gateway has 178 tests verified locally.
          # --coverage emits LCOV (Wave-16c §cleanup #6). Uploaded as artifact below.
          bun test \
            --coverage \
            --coverage-reporter=lcov \
            --coverage-dir=./coverage-ts \
            ./packages/shared/ \
            ./packages/core/ \
            ./packages/sse-bridge/ \
            ./infra/ \
            ./tests/unit/orchestration/ \
            ./tests/unit/core/ \
            ./tests/unit/skills/ \
            ./tests/unit/security/ \
            ./tests/unit/infra/ \
            ./tests/unit/swarm/ \
            ./tests/unit/email/

      - name: Run CLI tests (credential-safe subset)
        env:
          CI: 'true'
        run: |
          cd packages/cli && bun test \
            src/__tests__/commands/login.test.ts \
            src/__tests__/commands/upgrade.test.ts

      - name: Run web tests (vitest)
        run: cd packages/web && bun run test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install Python agent deps (uv + pyproject.toml)
        working-directory: packages/agents
        # Project uses uv + pyproject.toml (ADR-019). `uv sync --all-extras`
        # installs both runtime deps (strands-agents, bedrock-agentcore, boto3)
        # and test extras (pytest, pytest-mock, moto). Previous `pip install`
        # path could not resolve `strands-agents` and failed collection.
        run: uv sync --all-extras

      - name: Run Python agent unit tests
        working-directory: packages/agents
        # --cov emits Cobertura XML (Wave-16c §cleanup #6). Uploaded as artifact below.
        # Coverage scope is the packages/agents source tree (chimera_agent, tools/, etc.)
        # rather than `.` so we don't include the tests themselves in the metric.
        run: |
          mkdir -p ../../test-results
          uv run pytest tests/ \
            -v --tb=short \
            -m 'not integration' \
            --cov=. \
            --cov-report=xml:../../test-results/agents-coverage.xml \
            --cov-report=term \
            --junitxml=../../test-results/agents-unit.xml

      - name: Run Python agent integration tests
        if: env.AWS_ROLE_ARN != '' || env.AWS_ACCESS_KEY_ID_REAL != ''
        continue-on-error: true
        working-directory: packages/agents
        env:
          AWS_REGION: us-east-1
        run: |
          mkdir -p ../../test-results
          uv run pytest tests/ \
            -v --tb=short \
            -m 'integration' \
            --junitxml=../../test-results/agents-integration.xml

      - name: Run lint
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      # Wave-16c §cleanup #6: publish coverage artifacts for trend tracking.
      # `if: always()` so coverage still uploads even when a later step
      # (e.g. lint/typecheck) fails — partial coverage is still useful for
      # diagnosing regressions. A future Codecov hookup can consume these
      # artifacts via `codecov/codecov-action@v4` with a CODECOV_TOKEN secret.
      - name: Upload TypeScript coverage (LCOV)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-typescript-lcov
          path: coverage-ts/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Python coverage (Cobertura XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-python-cobertura
          path: test-results/agents-coverage.xml
          retention-days: 14
          if-no-files-found: warn

  build-containers:
    name: Build Docker Images
    runs-on: blacksmith-4vcpu-ubuntu-2404 # 4vcpu: Docker builds are CPU+IO heavy
    timeout-minutes: 15
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build monorepo packages
        run: |
          cd packages/shared && bunx tsc --build --force
          cd ../core && bunx tsc --build --force
          cd ../sse-bridge && bunx tsc --build --force

      - name: Bundle chat-gateway for Docker
        run: bun build packages/chat-gateway/src/server.ts --outdir packages/chat-gateway/dist --target bun

      - name: Build chat-gateway Docker image
        run: docker build -t chimera-chat-gateway:ci -f packages/chat-gateway/Dockerfile .

      - name: Build agents Docker image
        run: docker build -t chimera-agents:ci -f packages/agents/Dockerfile packages/agents/

      - name: Verify chat-gateway image
        run: docker run --rm chimera-chat-gateway:ci bun --version

  build-cli:
    name: Build CLI Binary
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript packages
        run: |
          cd packages/shared && bunx tsc --build --force
          cd ../core && bunx tsc --build --force

      - name: Compile CLI binary
        working-directory: packages/cli
        run: bun build src/cli.ts --compile --outfile chimera

      - name: Test CLI binary
        working-directory: packages/cli
        run: ./chimera --version

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-cli-linux-x64
          path: packages/cli/chimera
          retention-days: 7
