name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1' # Weekly on Monday at 2 AM UTC
  workflow_dispatch:

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '20'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  sast-scan:
    name: Static Application Security Testing
    runs-on: blacksmith-4vcpu-ubuntu-2404 # 4vcpu: CodeQL/semgrep SAST on ~100K LOC
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
          build-mode: none

      # CodeQL build-mode:none analyzes TypeScript source directly and does not
      # need `bun run build`. Previously this job ran `bun install && bun run
      # build`, which failed with TS6305 (stale composite project refs) and
      # blocked the scan. Skipping the build lets CodeQL do buildless extraction
      # on the source tree.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  secret-scan:
    name: Secret Scanning
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # gitleaks-action@v2 requires a paid GITLEAKS_LICENSE for GitHub orgs
      # (upstream breaking change that broke this scan on 2026-04-08). We
      # install the OSS gitleaks binary directly — license-free and the exact
      # same scanner the action wraps.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.21.2'
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Gitleaks secret scan
        # --no-git scans the working tree only (not git history) — historical
        # commits carry test-fixture "secrets" that are allowlisted in the
        # current .gitleaks.toml but predate the allowlist on disk.
        # --config is explicit so a misconfigured checkout can't fall back to
        # default rules and false-positive test fixtures.
        run: gitleaks detect --source=. --config=.gitleaks.toml --no-git --redact --verbose --no-banner

  security-summary:
    name: Security Summary
    runs-on: blacksmith-2vcpu-ubuntu-2404
    needs: [dependency-scan, sast-scan, secret-scan]
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Scan | ${{ needs.sast-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Check for failures
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ]; then
            echo "One or more security scans failed"
            exit 1
          fi
          echo "All security scans passed"
