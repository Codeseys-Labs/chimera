name: Release

on:
  push:
    tags:
      - 'v*'

env:
  BUN_VERSION: "1.0.0"

jobs:
  build-binaries:
    name: Build Binaries
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
            target: bun-linux-x64
          - os: macos-latest
            platform: darwin
            arch: x64
            target: bun-darwin-x64
          - os: macos-latest
            platform: darwin
            arch: arm64
            target: bun-darwin-arm64
          - os: windows-latest
            platform: windows
            arch: x64
            target: bun-windows-x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI binary
        working-directory: packages/cli
        env:
          TARGET_NAME: ${{ matrix.target }}
        run: |
          bun build src/cli.ts --compile --outfile "chimera-${TARGET_NAME}"

      - name: Rename binary (Windows)
        if: matrix.platform == 'windows'
        working-directory: packages/cli
        shell: bash
        env:
          TARGET_NAME: ${{ matrix.target }}
        run: mv "chimera-${TARGET_NAME}" "chimera-${TARGET_NAME}.exe"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: chimera-${{ matrix.target }}
          path: packages/cli/chimera-${{ matrix.target }}${{ matrix.platform == 'windows' && '.exe' || '' }}
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Generate release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # Generate release notes from git log
          if [ -n "$PREV_TAG" ]; then
            echo "# Release ${RELEASE_TAG}" > release_notes.md
            echo "" >> release_notes.md
            echo "## Changes since ${PREV_TAG}" >> release_notes.md
            echo "" >> release_notes.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" >> release_notes.md
          else
            echo "# Release ${RELEASE_TAG}" > release_notes.md
            echo "" >> release_notes.md
            echo "Initial release" >> release_notes.md
          fi

          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/chimera-bun-linux-x64/chimera-bun-linux-x64
            artifacts/chimera-bun-darwin-x64/chimera-bun-darwin-x64
            artifacts/chimera-bun-darwin-arm64/chimera-bun-darwin-arm64
            artifacts/chimera-bun-windows-x64/chimera-bun-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          echo "✓ Release ${RELEASE_TAG} created successfully"
          echo ""
          echo "Binaries available for:"
          echo "  - Linux x64"
          echo "  - macOS x64 (Intel)"
          echo "  - macOS ARM64 (Apple Silicon)"
          echo "  - Windows x64"
