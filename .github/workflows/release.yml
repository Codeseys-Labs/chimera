name: Release - Build and Publish Binaries

on:
  push:
    tags:
      - 'v*'

env:
  BUN_VERSION: '1.3.11'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract release notes from tag
        id: release_notes
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          git tag -l --format='%(contents)' "$VERSION" > release_notes.txt
          if [ ! -s release_notes.txt ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 "$VERSION^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since $PREV_TAG:" > release_notes.txt
              git log "$PREV_TAG..$VERSION" --pretty=format:"- %s (%h)" --no-merges >> release_notes.txt
            else
              echo "Initial release" > release_notes.txt
            fi
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Chimera ${{ steps.get_version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false

  build-binaries:
    name: Build ${{ matrix.platform }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: bun-linux-x64
            binary_name: chimera-linux-x64
            can_test: true
          - platform: linux-arm64
            os: ubuntu-latest
            target: bun-linux-arm64
            binary_name: chimera-linux-arm64
            can_test: false # arm64 binary on x64 runner
          - platform: darwin-arm64
            os: macos-14
            target: bun-darwin-arm64
            binary_name: chimera-darwin-arm64
            can_test: true
          - platform: darwin-x64
            os: macos-14
            target: bun-darwin-x64
            binary_name: chimera-darwin-x64
            can_test: false # x64 binary on arm64 runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript packages
        run: |
          cd packages/shared && bunx tsc --build --force
          cd ../core && bun run build

      - name: Compile binary
        working-directory: packages/cli
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary_name }}
        run: bun build src/cli.ts --compile --target="$TARGET" --outfile "$BINARY"

      - name: Make binary executable
        working-directory: packages/cli
        run: chmod +x "${{ matrix.binary_name }}"

      - name: Test binary
        if: matrix.can_test
        working-directory: packages/cli
        run: ./"${{ matrix.binary_name }}" --version

      - name: Create tarball
        working-directory: packages/cli
        run: tar -czf "${{ matrix.binary_name }}.tar.gz" "${{ matrix.binary_name }}"

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: packages/cli/${{ matrix.binary_name }}.tar.gz

  build-agent-archive:
    name: Build Agent Archive
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create agent archive
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          tar -czf chimera-agent-${VERSION}.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.overstory' \
            --exclude='dist' \
            --exclude='.mulch' \
            --exclude='.seeds' \
            --exclude='.claude' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            packages/ \
            infra/ \
            scripts/ \
            docs/ \
            package.json \
            bun.lock \
            tsconfig.json

      - name: Upload agent archive to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.version }}
          files: chimera-agent-${{ needs.create-release.outputs.version }}.tar.gz

  finalize-release:
    name: Finalize Release
    needs: [create-release, build-binaries, build-agent-archive]
    if: always() && needs.create-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Update release description
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        with:
          script: |
            const version = process.env.RELEASE_VERSION;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: version
            });
            const footer = `\n\n## Installation\n\nDownload the binary for your platform, extract, and move to your PATH:\n\n\`\`\`bash\ntar -xzf chimera-<platform>.tar.gz\nchmod +x chimera-<platform>\nsudo mv chimera-<platform> /usr/local/bin/chimera\nchimera --version\n\`\`\``;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: release.data.body + footer
            });
