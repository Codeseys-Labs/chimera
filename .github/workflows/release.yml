name: Release - Build and Publish Binaries

on:
  push:
    tags:
      - 'v*'

env:
  BUN_VERSION: "1.0.0"

jobs:
  # Create the GitHub release first
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract release notes from tag
        id: release_notes
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          # Get the tag annotation (which contains our release notes)
          git tag -l --format='%(contents)' "$VERSION" > release_notes.txt

          # If no annotation, generate from commits since last tag
          if [ ! -s release_notes.txt ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 "$VERSION^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              echo "Changes since $PREV_TAG:" > release_notes.txt
              git log "$PREV_TAG..$VERSION" --pretty=format:"- %s (%h)" --no-merges >> release_notes.txt
            else
              echo "Initial release" > release_notes.txt
            fi
          fi

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Chimera ${{ steps.get_version.outputs.version }}
          body_path: release_notes.txt
          draft: false
          prerelease: false

  # Build binaries for each platform in parallel
  build-binaries:
    name: Build ${{ matrix.platform }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            target: bun-linux-x64
            binary_name: chimera-linux-x64
          - platform: linux-arm64
            os: ubuntu-latest
            target: bun-linux-arm64
            binary_name: chimera-linux-arm64
          - platform: darwin-x64
            os: macos-13
            target: bun-darwin-x64
            binary_name: chimera-darwin-x64
          - platform: darwin-arm64
            os: macos-14
            target: bun-darwin-arm64
            binary_name: chimera-darwin-arm64
          - platform: windows-x64
            os: windows-latest
            target: bun-windows-x64
            binary_name: chimera-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build TypeScript packages
        run: |
          cd packages/shared && bun run build
          cd ../core && bun run build

      - name: Compile binary
        working-directory: packages/cli
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary_name }}
        run: bun build src/cli.ts --compile --target="$TARGET" --outfile "$BINARY"

      - name: Make binary executable (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        env:
          BINARY: ${{ matrix.binary_name }}
        run: chmod +x "$BINARY"

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        env:
          BINARY: ${{ matrix.binary_name }}
        run: ./"$BINARY" --version

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/cli
        env:
          BINARY: ${{ matrix.binary_name }}
        run: .\$env:BINARY --version

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        working-directory: packages/cli
        env:
          BINARY: ${{ matrix.binary_name }}
        run: tar -czf "$BINARY.tar.gz" "$BINARY"

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/cli
        env:
          BINARY: ${{ matrix.binary_name }}
        run: Compress-Archive -Path $env:BINARY -DestinationPath "$env:BINARY.zip"

      - name: Upload binary to release (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: packages/cli/${{ matrix.binary_name }}.tar.gz
          asset_name: chimera-${{ needs.create-release.outputs.version }}-${{ matrix.platform }}.tar.gz
          asset_content_type: application/gzip

      - name: Upload binary to release (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: packages/cli/${{ matrix.binary_name }}.zip
          asset_name: chimera-${{ needs.create-release.outputs.version }}-${{ matrix.platform }}.zip
          asset_content_type: application/zip

  # Build agent source archive for deployment
  build-agent-archive:
    name: Build Agent Archive
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create agent archive
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          # Create archive with deployable source files
          tar -czf chimera-agent-${VERSION}.tar.gz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.overstory' \
            --exclude='dist' \
            --exclude='.mulch' \
            --exclude='.seeds' \
            --exclude='.claude' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            packages/ \
            infra/ \
            scripts/ \
            docs/ \
            buildspec.yml \
            buildspec-docker.yml \
            SOUL.md \
            AGENTS.md \
            CLAUDE.md \
            package.json \
            bun.lock \
            tsconfig.json

      - name: Upload agent archive to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: chimera-agent-${{ needs.create-release.outputs.version }}.tar.gz
          asset_name: chimera-agent-${{ needs.create-release.outputs.version }}.tar.gz
          asset_content_type: application/gzip

  # Update release with installation instructions after all binaries are uploaded
  finalize-release:
    name: Finalize Release
    needs: [create-release, build-binaries, build-agent-archive]
    runs-on: ubuntu-latest
    steps:
      - name: Update release description
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = process.env.RELEASE_VERSION;

            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: version
            });

            const installInstructions = `
            ## Installation

            Download the appropriate binary for your platform:

            ### Linux (x64)
            \`\`\`bash
            wget https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${version}/chimera-${version}-linux-x64.tar.gz
            tar -xzf chimera-${version}-linux-x64.tar.gz
            chmod +x chimera-linux-x64
            sudo mv chimera-linux-x64 /usr/local/bin/chimera
            \`\`\`

            ### Linux (ARM64)
            \`\`\`bash
            wget https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${version}/chimera-${version}-linux-arm64.tar.gz
            tar -xzf chimera-${version}-linux-arm64.tar.gz
            chmod +x chimera-linux-arm64
            sudo mv chimera-linux-arm64 /usr/local/bin/chimera
            \`\`\`

            ### macOS (Intel)
            \`\`\`bash
            wget https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${version}/chimera-${version}-darwin-x64.tar.gz
            tar -xzf chimera-${version}-darwin-x64.tar.gz
            chmod +x chimera-darwin-x64
            sudo mv chimera-darwin-x64 /usr/local/bin/chimera
            \`\`\`

            ### macOS (Apple Silicon)
            \`\`\`bash
            wget https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${version}/chimera-${version}-darwin-arm64.tar.gz
            tar -xzf chimera-${version}-darwin-arm64.tar.gz
            chmod +x chimera-darwin-arm64
            sudo mv chimera-darwin-arm64 /usr/local/bin/chimera
            \`\`\`

            ### Windows (x64)
            Download and extract \`chimera-${version}-windows-x64.zip\`, then add the directory to your PATH.

            ### Agent Archive (for chimera deploy)
            \`\`\`bash
            wget https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${version}/chimera-agent-${version}.tar.gz
            tar -xzf chimera-agent-${version}.tar.gz
            \`\`\`

            ## Verify Installation
            \`\`\`bash
            chimera --version
            \`\`\`
            `;

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              body: release.data.body + '\n' + installInstructions
            });
