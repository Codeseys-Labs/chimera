name: Deploy - Canary & Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production
      skip_canary:
        description: 'Skip canary deployment (emergency)'
        required: false
        type: boolean
        default: false

env:
  BUN_VERSION: '1.3.11'
  NODE_VERSION: '20'
  AWS_REGION: us-west-2

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK Bootstrap (if needed)
        working-directory: infra
        run: npx cdk bootstrap --require-approval never

      - name: CDK Deploy - All Stacks
        working-directory: infra
        env:
          ENV_NAME: ${{ inputs.environment }}
        run: |
          npx cdk deploy --all --require-approval never \
            --context environment="$ENV_NAME"

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-infra]
    if: always()
    steps:
      - name: Report status
        run: |
          STATUS="${{ needs.deploy-infra.result }}"
          echo "Deploy result: $STATUS"
          if [ "$STATUS" != "success" ]; then
            echo "::warning::Deployment ended with status: $STATUS"
          fi
