<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chimera Chat</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* Layout with sidebar */
    .app-container {
      display: flex;
      height: 100vh;
      max-width: 100%;
      margin: 0 auto;
      background-color: var(--bg-primary);
    }

    /* Navigation sidebar */
    .nav-sidebar {
      width: 260px;
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .nav-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .nav-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0;
    }

    .nav-menu {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 0;
    }

    .nav-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      color: var(--text-primary);
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s;
      gap: 0.75rem;
    }

    .nav-item:hover {
      background-color: var(--bg-primary);
    }

    .nav-item.active {
      background-color: var(--bg-user);
      color: var(--text-inverse);
    }

    .nav-section-title {
      padding: 1rem 1.5rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .conversation-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: background-color 0.2s;
      font-size: 0.875rem;
    }

    .conversation-item:hover {
      background-color: var(--bg-primary);
    }

    .conversation-item.active {
      background-color: var(--bg-primary);
      border-left: 3px solid var(--bg-user);
    }

    .conversation-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-delete {
      opacity: 0;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.25rem;
      transition: opacity 0.2s;
    }

    .conversation-item:hover .conversation-delete {
      opacity: 1;
    }

    .conversation-delete:hover {
      color: var(--status-disconnected);
    }

    .new-chat-button {
      margin: 0 1rem 1rem;
      padding: 0.75rem;
      background-color: var(--bg-user);
      color: var(--text-inverse);
      border: none;
      border-radius: 0.5rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .new-chat-button:hover {
      opacity: 0.9;
    }

    /* Main content area */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header with user info and status */
    .content-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
    }

    .user-info {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* File upload area */
    .file-upload-container {
      padding: 0 1.5rem;
      margin-top: 0.5rem;
    }

    .file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .file-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background-color: var(--bg-secondary);
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

    .file-chip-remove {
      cursor: pointer;
      color: var(--text-secondary);
    }

    .file-chip-remove:hover {
      color: var(--status-disconnected);
    }

    .upload-button {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background-color 0.2s;
    }

    .upload-button:hover {
      background-color: var(--bg-primary);
    }

    /* Responsive design */
    @media (max-width: 768px) {
      .nav-sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100vh;
        z-index: 1000;
        transition: left 0.3s;
        box-shadow: var(--shadow);
      }

      .nav-sidebar.mobile-open {
        left: 0;
      }

      .mobile-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .mobile-overlay.show {
        display: block;
      }

      .mobile-menu-button {
        display: block;
        padding: 0.5rem;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-primary);
      }
    }

    @media (min-width: 769px) {
      .mobile-menu-button {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Navigation Sidebar -->
    <nav class="nav-sidebar" id="nav-sidebar">
      <div class="nav-header">
        <h1>Chimera</h1>
      </div>

      <div class="nav-menu">
        <a href="/index.html" class="nav-item active">
          <span>💬</span>
          <span>Chat</span>
        </a>
        <a href="/dashboard.html" class="nav-item">
          <span>📊</span>
          <span>Dashboard</span>
        </a>
        <a href="/settings.html" class="nav-item">
          <span>⚙️</span>
          <span>Settings</span>
        </a>
        <a href="/admin.html" class="nav-item">
          <span>🔧</span>
          <span>Admin</span>
        </a>

        <div class="nav-section-title">Conversations</div>
        <button class="new-chat-button" id="new-chat-button">+ New Chat</button>
        <div id="conversations-list"></div>
      </div>
    </nav>

    <!-- Mobile overlay -->
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <!-- Main Content -->
    <div class="main-content">
      <header class="content-header">
        <div style="display: flex; align-items: center; gap: 1rem;">
          <button class="mobile-menu-button" id="mobile-menu-button">☰</button>
          <div class="user-info" id="user-info"></div>
        </div>
        <div class="header-actions">
          <div class="status" id="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Disconnected</span>
          </div>
          <button id="logout-button" style="padding: 0.5rem 1rem; background-color: var(--text-secondary); color: var(--text-inverse); border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem;">
            Logout
          </button>
        </div>
      </header>

      <main style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        <div class="chat-container" id="chat-container">
          <div class="welcome-message">
            <h2>Welcome to Chimera</h2>
            <p>Start a conversation with your AI assistant.</p>
          </div>
        </div>

        <!-- File upload preview -->
        <div class="file-upload-container" id="file-upload-area" style="display: none;">
          <div class="file-preview" id="file-preview"></div>
        </div>

        <div class="input-container">
          <form id="chat-form">
            <input type="file" id="file-input" multiple accept="image/*,audio/*,video/*,application/pdf,text/*" style="display: none;" />
            <label for="file-input" class="upload-button" style="cursor: pointer;">
              📎 Attach
            </label>
            <input
              type="text"
              id="message-input"
              placeholder="Type your message..."
              autocomplete="off"
              disabled
              style="flex: 1;"
            />
            <button type="submit" id="send-button" disabled>Send</button>
          </form>
        </div>
      </main>

      <footer style="padding: 0.75rem 1.5rem; text-align: center; font-size: 0.875rem; color: var(--text-secondary); background-color: var(--bg-secondary); border-top: 1px solid var(--border-color);">
        <p>AWS Chimera - Multi-Tenant Agent Platform</p>
      </footer>
    </div>
  </div>

  <script src="/auth.js"></script>
  <script src="/chat.js"></script>
  <script>
    // Display user info
    const userInfo = window.ChimeraAuth?.getUserInfo();
    if (userInfo) {
      const userInfoEl = document.getElementById('user-info');
      if (userInfoEl) {
        userInfoEl.textContent = `${userInfo.email || userInfo.sub} • ${userInfo.tenantId}`;
      }
    }

    // Wire up logout button
    const logoutButton = document.getElementById('logout-button');
    if (logoutButton) {
      logoutButton.addEventListener('click', () => {
        window.ChimeraAuth?.logout();
      });
    }

    // Mobile menu toggle
    const mobileMenuButton = document.getElementById('mobile-menu-button');
    const navSidebar = document.getElementById('nav-sidebar');
    const mobileOverlay = document.getElementById('mobile-overlay');

    if (mobileMenuButton && navSidebar && mobileOverlay) {
      mobileMenuButton.addEventListener('click', () => {
        navSidebar.classList.toggle('mobile-open');
        mobileOverlay.classList.toggle('show');
      });

      mobileOverlay.addEventListener('click', () => {
        navSidebar.classList.remove('mobile-open');
        mobileOverlay.classList.remove('show');
      });
    }
  </script>
</body>
</html>
