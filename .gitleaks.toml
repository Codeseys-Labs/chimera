title = "Chimera gitleaks config"

# Extend gitleaks v8 default rules. Our [[allowlists]] below are additive —
# they apply on top of the defaults, NOT instead of them.
[extend]
useDefault = true

# CI mock credentials for CDK unit tests — literal string "testing", not a real key.
[[allowlists]]
description = "CI mock AWS credentials literal in ci.yml"
paths = ['''\.github/workflows/ci\.yml''']
regexes = ['''AWS_ACCESS_KEY_ID:\s*testing''', '''AWS_SECRET_ACCESS_KEY:\s*testing''']

# Test fixtures that intentionally contain key-shaped strings to exercise
# the static analyzer / skill validator. These are input data for tests,
# not real credentials.
[[allowlists]]
description = "Skill security analyzer + tool validator test fixtures"
paths = [
  '''packages/core/src/skills/__tests__/static-analyzer\.test\.ts''',
  '''packages/core/src/skills/__tests__/validator\.test\.ts''',
  '''packages/core/src/tools/__tests__/tools\.test\.ts''',
]

# Historical CDK code containing URL-shaped strings flagged by the generic
# URI rule (e.g. Bedrock endpoint examples in api-stack.ts inline docs).
# We grep these by line content via stopwords because a full-file allow
# would be too broad.
[[allowlists]]
description = "Inline architecture examples in CDK stacks"
paths = ['''infra/lib/api-stack\.ts''']

# Research docs are design narratives — any key-shaped strings in them are
# illustrative examples (e.g. "sk-..." in a diagram), not real credentials.
[[allowlists]]
description = "Research/design documentation"
paths = [
  '''docs/research/.*\.md''',
  '''docs/architecture/.*\.md''',
  '''docs/runbooks/.*\.md''',
  '''docs/designs/.*\.md''',
  '''docs/reviews/.*\.md''',
]

# Build artifacts + local agent logs are gitignored but `--no-git` still
# walks them. They contain S3 asset hashes + CloudFormation synthesis that
# look key-shaped to gitleaks default rules.
[[allowlists]]
description = "CDK build artifacts and local agent logs (gitignored)"
paths = [
  '''infra/cdk\.out/.*''',
  '''cdk\.out/.*''',
  '''\.overstory/logs/.*''',
  '''\.overstory/worktrees/.*''',
  '''node_modules/.*''',
  '''\.venv/.*''',
  '''packages/.*/\.venv/.*''',
  '''packages/.*/node_modules/.*''',
  '''packages/agents/\.venv/.*''',
]
