version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      - bun --version

  pre_build:
    commands:
      - export PATH="$HOME/.bun/bin:$PATH"
      - bun install --frozen-lockfile

  build:
    commands:
      - export PATH="$HOME/.bun/bin:$PATH"
      - 'bun run lint || true'
      - 'bun run typecheck || true'
      - 'bun run test || true'
      - cd infra && npx cdk synth --all && cd ..
      # Resolve Cognito + API config from deployed stacks for the Vite build.
      # These are baked into the JS bundle at compile time via import.meta.env.
      - export VITE_COGNITO_USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name "Chimera-${ENV_NAME:-dev}-Security" --query 'Stacks[0].Outputs[?OutputKey==`UserPoolId`].OutputValue' --output text 2>/dev/null || echo "")
      - export VITE_COGNITO_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name "Chimera-${ENV_NAME:-dev}-Security" --query 'Stacks[0].Outputs[?OutputKey==`WebClientId`].OutputValue' --output text 2>/dev/null || echo "")
      - export VITE_API_BASE_URL=$(aws cloudformation describe-stacks --stack-name "Chimera-${ENV_NAME:-dev}-Api" --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' --output text 2>/dev/null || echo "")
      - echo "Building web with VITE_COGNITO_USER_POOL_ID=$VITE_COGNITO_USER_POOL_ID VITE_COGNITO_CLIENT_ID=$VITE_COGNITO_CLIENT_ID VITE_API_BASE_URL=$VITE_API_BASE_URL"
      - cd packages/web && bun run build && cd ../..

artifacts:
  files:
    - infra/**/*
    - packages/**/*
  name: ChimeraBuildOutput

cache:
  paths:
    - $HOME/.bun/install/cache/**/*
    - node_modules/**/*
    - .next/cache/**/*
