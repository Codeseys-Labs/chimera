version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      - bun --version

  pre_build:
    commands:
      - bun install --frozen-lockfile
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

  build:
    commands:
      - bun run lint
      - bun run typecheck
      - bun test --coverage
      - cd infra && bunx cdk synth --all && cd ..
      - export IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}
      - docker build -t $ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REPOSITORY:latest -f packages/agents/Dockerfile packages/agents/
      - docker push $ECR_REPOSITORY:$IMAGE_TAG
      - docker push $ECR_REPOSITORY:latest
      - echo "$ECR_REPOSITORY:$IMAGE_TAG" > image-uri.txt
      - export IMAGE_URI="$ECR_REPOSITORY:$IMAGE_TAG"

  post_build:
    commands:
      - cd infra && bunx cdk deploy --all --require-approval never --context environment="$ENV_NAME" --context repositoryName="chimera" && cd ..

artifacts:
  files:
    - image-uri.txt
    - infra/**/*
    - packages/**/*
  name: ChimeraBuildArtifacts

env:
  exported-variables:
    - IMAGE_URI

cache:
  paths:
    - $HOME/.bun/install/cache/**/*
    - node_modules/**/*
    - .next/cache/**/*
