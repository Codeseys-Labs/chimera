version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      - bun --version

  pre_build:
    commands:
      - bun install --frozen-lockfile

  build:
    commands:
      - bun run lint || true
      - bun run typecheck || true
      - bun test --coverage || true
      - cd infra && npx cdk synth --all && cd ..
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)

      # Prebundle chat-gateway with workspace deps resolved at CodeBuild time
      - bun build packages/chat-gateway/src/server.ts --outdir packages/chat-gateway/dist --target bun

      # Build and push chat-gateway image (Bun + Hono)
      - echo "Building chat-gateway image..."
      - docker build -t $ECR_REPOSITORY_CHAT_GATEWAY:$IMAGE_TAG -t $ECR_REPOSITORY_CHAT_GATEWAY:latest -f packages/chat-gateway/Dockerfile .
      - docker push $ECR_REPOSITORY_CHAT_GATEWAY:$IMAGE_TAG
      - docker push $ECR_REPOSITORY_CHAT_GATEWAY:latest
      - echo "$ECR_REPOSITORY_CHAT_GATEWAY:$IMAGE_TAG" > chat-gateway-image-uri.txt
      - export CHAT_GATEWAY_IMAGE_URI="$ECR_REPOSITORY_CHAT_GATEWAY:$IMAGE_TAG"

      # Build and push agent image (Python + uv)
      - echo "Building agent image..."
      - docker build -t $ECR_REPOSITORY_AGENT:$IMAGE_TAG -t $ECR_REPOSITORY_AGENT:latest -f packages/agents/Dockerfile packages/agents/
      - docker push $ECR_REPOSITORY_AGENT:$IMAGE_TAG
      - docker push $ECR_REPOSITORY_AGENT:latest
      - echo "$ECR_REPOSITORY_AGENT:$IMAGE_TAG" > agent-image-uri.txt
      - export AGENT_IMAGE_URI="$ECR_REPOSITORY_AGENT:$IMAGE_TAG"

      # Backward compatibility: keep image-uri.txt pointing to agent image
      - echo "$ECR_REPOSITORY_AGENT:$IMAGE_TAG" > image-uri.txt
      - export IMAGE_URI="$ECR_REPOSITORY_AGENT:$IMAGE_TAG"

  post_build:
    commands:
      - cd infra && npx cdk deploy --all --require-approval never --concurrency 3 --context environment="$ENV_NAME" --context repositoryName="chimera" && cd ..

artifacts:
  files:
    - infra/**/*
    - packages/**/*
  name: ChimeraBuildOutput

cache:
  paths:
    - $HOME/.bun/install/cache/**/*
    - node_modules/**/*
    - .next/cache/**/*
