version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - curl -fsSL https://bun.sh/install | bash
      - export PATH="$HOME/.bun/bin:$PATH"
      - bun --version

  pre_build:
    commands:
      - bun install --frozen-lockfile

  build:
    commands:
      - bun run lint || true
      - bun run typecheck || true
      - bun test --coverage || true
      - cd infra && npx cdk synth --all && cd ..

artifacts:
  files:
    - infra/**/*
    - packages/**/*
  name: ChimeraBuildOutput

cache:
  paths:
    - $HOME/.bun/install/cache/**/*
    - node_modules/**/*
    - .next/cache/**/*
